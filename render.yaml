services:
  - type: web
    name: insurance-chatbot-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: LLM_PROVIDER
        value: huggingface
      - key: HF_MODEL
        value: microsoft/Phi-3-mini-4k-instruct
      - key: HF_DEVICE
        value: cpu
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: PYTHON_VERSION
        value: 3.11

  - type: web
    name: insurance-chatbot-ui
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/ui/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_BASE_URL
        sync: false  # Set this to your API URL after first deploy
      - key: STREAMLIT_SERVER_PORT
        value: 10000
